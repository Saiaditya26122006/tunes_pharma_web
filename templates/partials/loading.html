<style>
  .tp-loader {
    position: fixed; inset: 0;
    background: #05101A;
    z-index: 9999;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.5s ease, visibility 0.5s ease;
  }
  .tp-loader.fade-out { opacity: 0; visibility: hidden; }

  /* Logo circle */
  .tp-logo {
    width: 88px; height: 88px; border-radius: 50%;
    background: #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    position: relative;
    animation: tpLogoIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
  }
  .tp-logo img { width: 62px; height: auto; display: block; }

  /* Single ripple ring */
  .tp-ripple {
    position: absolute; inset: -4px; border-radius: 50%;
    border: 1.5px solid rgba(201,169,110,0.6);
    animation: tpRipple 1.6s ease-out 0.5s infinite;
  }

  /* Brand text block */
  .tp-text {
    margin-top: 24px; text-align: center;
    animation: tpTextIn 0.45s ease 0.5s both;
  }
  .tp-name {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 1.55rem; font-weight: 700;
    color: #fff; letter-spacing: 0.04em;
    line-height: 1;
  }
  .tp-tag {
    margin-top: 8px;
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.24em; text-transform: uppercase;
    color: rgba(201,169,110,0.75);
  }

  /* Slim progress bar */
  .tp-bar {
    position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg,
      transparent, #1E6FF1 30%, #C9A96E 60%, transparent);
    transform: scaleX(0); transform-origin: left;
    animation: tpBar 1.8s cubic-bezier(0.4,0,0.2,1) 0.1s forwards;
  }

  @keyframes tpLogoIn {
    from { opacity: 0; transform: scale(0.8); }
    to   { opacity: 1; transform: scale(1); }
  }
  @keyframes tpRipple {
    from { transform: scale(1); opacity: 0.7; }
    to   { transform: scale(2.2); opacity: 0; }
  }
  @keyframes tpTextIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes tpBar { to { transform: scaleX(1); } }
</style>

<div class="tp-loader" id="globalLoading">
  <div class="tp-logo">
    <div class="tp-ripple"></div>
    <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Tunes Pharma">
  </div>
  <div class="tp-text">
    <div class="tp-name">Tunes Pharma</div>
    <div class="tp-tag">Retunes the Health</div>
  </div>
  <div class="tp-bar"></div>
</div>

<script>
  (function () {
    function hide() {
      var el = document.getElementById('globalLoading');
      if (!el) return;
      setTimeout(function () {
        el.classList.add('fade-out');
        setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 520);
      }, 1600);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', hide);
    } else {
      hide();
    }
  })();
</script>
